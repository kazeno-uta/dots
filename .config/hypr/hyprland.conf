# source = ~/.config/hypr/myColors.conf

#################
### TO DELETE ###
#################

bind=super ctrl alt,M, exit,

################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=,preferred,auto,auto
monitor=DP-3,preferred,0x0,1, transform, 0
monitor=HDMI-1-A, preferred, auto, 1
# monitor=HDMI-A-1, preferred,auto,1, mirror, DP-3

###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = thunar
$menu = ~/.config/hypr/scripts/wofi.sh


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

exec-once = uwsm app -- nm-applet &
exec-once = uwsm app -- swww-daemon & waybar & zen-browser 
exec-once = uwsm app -- swaync
exec-once = uwsm app -- udiskie &
exec-once = vesktop 
exec-once = /opt/Deezer\ Discord\ RPC/deezer-discord-rpc
exec-once = steam
exec-once = uwsm app -- dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = uwsm app -- systemctl --user start hyprpolkitagent

# exec-once = uwsm app -- wl-paste --type text --watch cliphist store #Stores only text data
# exec-once = uwsm app -- wl-paste --type image --watch cliphist store #Stores only image data
exec-once = [workspace dropdown silent] kitty --config ~/.config/kitty/dropdown.conf -o allow_remote_control=yes --class=kitty-dropdown --title=kitty-dropdown env XDG_CONFIG_HOME=/tmp/empty fish --init-command "source ~/.config/fish/empty.fish"
exec-once = uwsm app -- ~/.config/hypr/scripts/gameOn9.sh
exec-once = uwsm app -- ~/.config/hypr/scripts/geo.sh
exec-once = uwsm app -- ~/.config/hypr/scripts/changeConfig.sh


# execs
exec = swww img --transition-type wipe --transition-angle 30 --transition-step 90 ~/wallpaper/crosscode2.gif --transition-fps 60
exec = hyprsunset -t 2500

# wallpaper



#############################
### ENVIRONMENT VARIABLES ###
#############################
# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_SIZE,30
env = HYPRCURSOR_SIZE,30
env = hyprcursor_theme, catppuccin-mocha-lavender-cursors

env = GCM_CREDENTIAL_STORE,cache
env = XDG_SESSION_TYPE,wayland
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = QT_QPA_PLATFORMTHEME,qt6ct
env = XDG_CURRENT_DESKTOP, Hyprland

# IMF/IME
env = GTK_IM_MODULE, fcitx
env= QT_IM_MODULE,fcitx
env = XMODIFIERS=@im,fcitx

#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
general { 
    gaps_in = 2
    gaps_out = 5
    border_size = 2 

    col.active_border = rgba(FF6D00ff)# rgba(1015E7FF) 69deg
    col.inactive_border = rgba(7D8A9Aff)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false 

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = true

    layout = master
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 2
    blur {
        enabled = true
        size = 4
        passes = 2
        new_optimizations = on
        ignore_opacity = true
        # xray = true
        # blurls = waybar
    }
    active_opacity = 1.0
    inactive_opacity = 0.8
    fullscreen_opacity = 1.0

    shadow{
        range = 30
        color = 0x66000000
        
      }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = true
    bezier = wind, 0.05, 0.9, 0.1, 1.05
    bezier = winIn, 0.1, 1.1, 0.1, 1.1
    bezier = winOut, 0.3, -0.3, 0, 1
    bezier = liner, 1, 1, 1, 1
    animation = windows, 1, 4, wind, slide
#    animation = windowsIn, 1, 6, winIn, slide
    animation = windowsOut, 1, 4, winOut, popin 
    animation = border, 1, 1, liner
    animation = fade, 1, 7, default
    animation = workspaces, 1, 2, default
}

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    # pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
    # smart_split = true
    
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    allow_small_split = true 
    new_status = slave #master 
    new_on_top = true
    mfact = 0.65

}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc { 
    force_default_wallpaper = 2 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
    disable_splash_rendering = false
    vrr = 2
    animate_manual_resizes = true
    middle_click_paste = true
    render_unfocused_fps = 60
}

#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = jp
    kb_variant =
    kb_model =
    kb_options = compose:ralt 
    kb_rules =

    numlock_by_default = true

    follow_mouse = 1
    follow_mouse_threshold = 20
    focus_on_close=1

    sensitivity = 0.3 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
    }

    #tablet{
    #  output = DP-3
    #  left_handed = true 
    #  active_area_size = 38.10, 50.80
    #}
  

 }

# https://wiki.hyprland.org/Configuring/Variables/#gestures

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}
device {
    name=wacom-one-by-wacom-s-pen
    left_handed=true
    output=DP-3
}

####################
### KEYBINDINGS ###
####################

source= ~/.config/hypr/binds.conf

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Example windowrule v1
# windowrule = float, ^(kitty)$

windowrule = match:class ^(.*pavucontrol)$, float on
windowrule = match:class ^(blueman-manager)$, float on
windowrule = match:class ^([Tt]hunar)$, float on size 980 580
windowrule = match:class ^(steam)$, match:title ^(Friends List|.*Settings|(^?!Steam$).*)$, float on
windowrule = match:class ^(.*Chromium.*)$, float on

windowrule = workspace special:discord silent,match:class ^(\b([Dd]eezer.*|discord|vesktop)\b)$
windowrule = workspace 10 silent, match:class ^(steam)$
windowrule = workspace 9, fullscreen on, match:class ^(steam_app_\d+)$

# windowrule = workspace special:dropterm, match:class ^(kitty-dropdown)$
windowrule = float on, match:class ^(kitty-dropdown)$
windowrule = size 100% 50%, match:class ^(kitty-dropdown)$
windowrule = move 0 0, match:class ^(kitty-dropdown)$

# firefox PiP
windowrule = float on, match:title ^(Picture-in-Picture)$
windowrule = float on, match:title ^(Open Files)$
windowrule = size 800 450, match:title ^(Picture-in-Picture)$
windowrule = pin on, match:title ^(Picture-in-Picture)$
windowrule = opacity 1 override, match:title ^(Picture-in-Picture)$

windowrule = opacity 1 override, match:title ^(.*YouTube.*|.*\- Twitch.*)$
windowrule = render_unfocused on, match:title ^(ELDEN RING NIGHTREIGN)$


workspace = 1, monitor:DP-3
workspace = 9, monitor:DP-3
workspace = 10, monitor:HDMI-A-1
workspace = 2, monitor:HDMI-A-1

# windowrulev2 = noblur, match:title ^(kitty +kitten panel.*)$
# windowrulev2 = opacity 0.3 override match:title ^(kitty +kitten panel.*)$

# Example windowrule v2
# windowrulev2 = float on,match:class ^(kitty)$,match:title ^(kitty)$

windowrule = suppress_event maximize, match:class .* # You'll probably like this.
# immediate # to force tearing to a game

